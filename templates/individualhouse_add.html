<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Individual House</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='submitproperty.css') }}" />
  </head>
  <body>
    <header>
        <div class="top-bar">
            <div class="auth-links">
              <span>Welcome, Admin</span>
              <a href="{{ url_for('main') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

      <nav class="navbar">
        <div class="logo">
          <h1>HOME<span>HUB</span></h1>
        </div>
        <div class="menu">
          <a href="{{ url_for('admin_add_option') }}">Previous</a>
        </div>
      </nav>
    </header>

    <div class="container">
      <h1>Submit Individual House Details</h1>

      <form action="{{ url_for('individualhouse_add') }}" method="post" enctype="multipart/form-data">
        <section class="form-section">
          <h2>Contact & Location</h2>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />

          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required />

          <label for="price">Price</label>
          <input type="number" id="price" name="price" placeholder="Enter price" required />

          <label for="landmark">Landmark</label>
          <input type="text" id="landmark" name="landmark" placeholder="Enter landmark" required />

          <label for="facility">Nearby Facility</label>
          <select id="facility" name="nearbyfacility" required>
            <option value="">Select Type</option>
            <option value="hospital">Hospital</option>
            <option value="school">School</option>
            <option value="market">Market</option>
            <option value="shoppingmall">Shopping Mall</option>
          </select>

          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="Enter address" required />

          <label for="pincode">Pincode</label>
          <input type="number" id="pincode" name="pincode" placeholder="Enter pincode" required />
        </section>

        <section class="form-section">
          <h2>House Details</h2>

          <label for="houseRooms">Number of Rooms</label>
          <input type="number" id="houseRooms" name="houseRooms" placeholder="Enter number of rooms" />

          <label for="houseArea">House Area (in Sq Feet)</label>
          <input type="number" id="houseArea" name="houseArea" placeholder="Enter house area" />

          <label for="kitchenType">Kitchen Type</label>
          <select id="kitchenType" name="kitchenType" required>
            <option value="">Select</option>
            <option value="modular">Modular</option>
            <option value="traditional">Traditional</option>
          </select>

          <label for="storageSpaces">Storage Spaces</label>
          <input type="text" id="storageSpaces" name="storageSpaces" placeholder="Mention storage spaces" />

          <label for="status">Status</label>
          <select id="status" name="status" required>
            <option value="available">Available</option>
            <option value="sold">Sold</option>
          </select>

          <label for="propertyImage">Image of Property</label>
          <input type="file" id="propertyImage" name="propertyImage" accept="image/*" required />
        </section>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
