<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Property - Individual House</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='submitproperty.css') }}"
    />
  </head>
  <body>
    <header>
      <div class="top-bar">
        <div class="auth-links">
          {% if 'email' in session %}
          <span>Welcome, {{ session['email'] }}!</span>
          <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
          {% else %}
          <a href="{{ url_for('login') }}"><i class="fas fa-sign-in-alt"></i> Login</a>
          <a href="{{ url_for('register') }}"><i class="fas fa-user-plus"></i> Register</a>
          {% endif %}
        </div>
      </div>

      <nav class="navbar">
        <div class="logo">
          <h1>HOME<span>HUB</span></h1>
        </div>
        <div class="menu">
          <a href="{{ url_for('main') }}">Home</a>
          <a href="{{ url_for('about') }}">About</a>
          <a href="{{ url_for('properties') }}">Properties</a>
          <a href="{{ url_for('agent') }}">Agent</a>
          <a href="{{ url_for('contact') }}">Contact</a>
        </div>
        <a href="{{ url_for('submit_option') }}" class="submit-property">Submit Property</a>
      </nav>
    </header>

    <div class="container">
      <h1>Submit Individual House Details</h1>

      <form action="{{ url_for('individualhouse') }}" method="post" enctype="multipart/form-data">
        <section class="form-section">
          <h2>Personal Information</h2>
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
            required
          />

          <label for="phone">Phone</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="Enter your phone number"
            required
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </section>

        <section class="form-section">
          <h2>Outstanding Loans</h2>
          <label for="outstandingloan">Have you taken Outstanding Loans?</label>
          <select id="outstandingloan" name="outstandingloan" onchange="LoanDetails()">
            <option value="select">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
          <div id="loan-details" style="display: none; margin-top: 10px">
            <label for="loanAmount">Loan Amount (in Rs):</label>
            <input
              type="number"
              id="loanAmount"
              name="loanAmount"
              placeholder="Enter loan amount"
            />

            <label for="loanBalance">Current Loan Balance (in Rs):</label>
            <input
              type="number"
              id="loanBalance"
              name="loanBalance"
              placeholder="Enter remaining balance"
            />

            <label for="lenderName">Lender's Name:</label>
            <input
              type="text"
              id="lenderName"
              name="lenderName"
              placeholder="Enter lender name"
            />

            <label for="nextRepayment">Next Repayment Due Date:</label>
            <input
              type="date"
              id="nextRepayment"
              name="nextRepayment"
            />

            <label for="loanDocument">Upload Loan Statement or Proof:</label>
            <input
              type="file"
              id="loanDocument"
              name="loanDocument"
              accept=".pdf,.jpg,.png"
            />
          </div>
        </section>

        <section class="form-section">
          <h2>Individual House Details</h2>

          <label for="houseRooms">Number of Rooms</label>
          <input
            type="number"
            id="houseRooms"
            name="houseRooms"
            placeholder="Enter number of rooms"
          />

          <label for="houseArea">House Area (in Sq Feet)</label>
          <input
            type="number"
            id="houseArea"
            name="houseArea"
            placeholder="Enter house area"
          />

          <label for="kitchenType">Kitchen Type</label>
          <select id="kitchenType" name="kitchenType" required>
            <option value="">Select</option>
            <option value="modular">Modular</option>
            <option value="traditional">Traditional</option>
          </select>

          <label for="storageSpaces">Storage Spaces</label>
          <input
            type="text"
            id="storageSpaces"
            name="storageSpaces"
            placeholder="Mention storage spaces (e.g., built-in wardrobes, cabinets)"
          />

          <label for="status">Status</label>
          <select id="status" name="status" required>
            <option value="available">Available</option>
            <option value="sold">Sold</option>
          </select>

          <label for="propertyImage">Image of Property</label>
          <input
            type="file"
            id="propertyImage"
            name="propertyImage"
            accept="image/*"
            required
          />
        </section>

        <section class="form-section">
          <h2>Price & Location</h2>
          <label for="price">Price</label>
          <input
            type="number"
            id="price"
            name="price"
            placeholder="Enter price"
            required
          />

          <label for="landmark">Landmark</label>
          <input
            type="text"
            id="landmark"
            name="landmark"
            placeholder="Enter landmark"
            required
          />

          <label for="facility">Nearby Facility</label>
          <select id="facility" name="nearbyfacility" required>
            <option value="">Select Type</option>
            <option value="hospital">Hospital</option>
            <option value="school">School</option>
            <option value="market">Market</option>
            <option value="shoppingmall">Shopping Mall</option>
          </select>

          <label for="address">Address</label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="Enter address"
            required
          />

          <label for="pincode">Pincode</label>
          <input
            type="number"
            id="pincode"
            name="pincode"
            placeholder="Enter pincode"
            required
          />
        </section>

        <button type="submit">Submit</button>
      </form>
    </div>

    <script>
      function LoanDetails() {
        var loanSelect = document.getElementById("outstandingloan").value;
        var loanDetails = document.getElementById("loan-details");

        if (loanSelect === "yes") {
          loanDetails.style.display = "block";
        } else {
          loanDetails.style.display = "none";
        }
      }
    </script>
  </body>
</html>
