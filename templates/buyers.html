<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyers List - Property Management System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      integrity="sha512-Fo3rlrZj/k7ujTTX6g2XKM0P+tqKsCd5b3i7sHg5I2q1lLJEV/ytPL3Wgp4P/cyPfRX/2N6BzQGFKFNi9Vz0Iw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
        color: #333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .top-bar {
        background-color: #333;
        color: white;
        padding: 10px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }

      .top-bar .auth-links a {
        color: white;
        text-decoration: none;
        margin-left: 10px;
      }

      .navbar {
        background-color: white;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      .navbar .logo h1 {
        margin: 0;
        color: #333;
        font-size: 24px;
      }

      .navbar .logo span {
        color: #4caf50;
      }

      .navbar .menu {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .navbar .menu a {
        color: #333;
        text-decoration: none;
        font-weight: bold;
        padding: 10px 20px;
        transition: color 0.3s ease;
      }

      .navbar .menu a:hover {
        color: #4caf50;
      }

      main {
        display: flex;
        flex-grow: 1;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .dashboard-options {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 40px;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        max-width: 1200px;
        margin: 20px 0;
        background-color: white;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      }

      th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      th {
        background-color: #4caf50;
        color: white;
      }

      tr:nth-child(even) {
        background-color: #f4f4f4;
      }

      tr:hover {
        background-color: #ddd;
      }

    </style>
</head>
<body>
    <header>
      <div class="top-bar">
        <div class="auth-links">
          <span>Welcome, Admin</span>
          <a href="{{ url_for('main') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
      </div>

      <nav class="navbar">
        <div class="logo">
          <h1>ADMIN<span>HUB</span></h1>
        </div>
        <div class="menu">
            <a href="{{ url_for('users_list') }}">Previous</a>
        </div>
      </nav>
    </header>

    <main>
      <h1>Buyers List</h1>
      <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>
        {% for buyer in buyers %}
        <tr>
            <td>{{ buyer[0] }}</td>  <!-- ID -->
            <td>{{ buyer[1] }}</td>  <!-- Name -->
            <td>{{ buyer[2] }}</td>  <!-- Email -->
            <td>{{ buyer[3] }}</td>  <!-- Phone -->
        </tr>
        {% endfor %}
      </table>
    </main>
</body>
</html>
